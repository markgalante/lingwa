services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lingwa
      POSTGRES_PASSWORD: lingwa
      POSTGRES_DB: lingwa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Named volume shields the image-built data (dict + argostranslate models)
      # from the bind mount above. Docker initialises it from the image on first
      # run; subsequent starts reuse the volume so the download isn't repeated.
      # Run `docker volume rm lingwa_backend_data` to force a refresh.
      - backend_data:/app/data
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://lingwa:lingwa@db:5432/lingwa
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  backend_data:
  frontend_node_modules:
